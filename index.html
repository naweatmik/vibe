<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>naweatmik</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { text-align: center; padding: 3rem 2rem; max-width: 480px; width: 90%; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #3ecfcf); margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #6c63ff, #3ecfcf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #aaa; line-height: 1.7; margin-bottom: 1.5rem; }
    .badge { display: inline-block; padding: 0.3rem 0.9rem; border-radius: 20px; background: rgba(108,99,255,0.2); border: 1px solid #6c63ff; font-size: 0.85rem; color: #6c63ff; margin: 0.2rem; }
    .footer { margin-top: 2rem; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>naweatmik</h1>
    <p>안녕하세요! 이곳은 저의 개인 공간입니다.<br>새로운 것을 배우고 만들어가는 걸 좋아합니다.</p>
    <div>
      <span class="badge">⚡ Vibe Coding</span>
      <span class="badge">🚀 GitHub Pages</span>
      <span class="badge">🛠 Claude Code</span>
    </div>
    <div class="footer">Built with ❤️ using Claude Code</div>
  </div>
</body>
</html>
